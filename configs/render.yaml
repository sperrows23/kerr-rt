black_hole:
  spin: 0.999      # a — the single source of truth. r_isco / r_plus are NOT stored here:
                   # they are FUNCTIONS of spin, computed at load by
                   # src/renderer/kerr_params.resolve_config (Formula 2 / CKS-6, see CKS-13)
                   # and injected as black_hole.r_isco / black_hole.r_plus. The old literals
                   # (1.182 / 1.0447 for a=0.999) silently desynced whenever spin was edited.

render:
  width: 3840
  height: 2160
  thumb_width: 256
  thumb_height: 256
  max_steps_pipe_a: 500        # Pipe B (volumetric disk march) shares this same trace loop / step cap.
                               # CKS affine λ advances ~1 coord-unit per unit λ (unlike BL Mino time, which
                               # advanced ~r² per unit λ), so a photon must take ~(r_max−r_cam)/h far-field
                               # steps to escape plus extra near the photon ring — hence the larger cap.
  r_max: 50.0
  device_memory_gb: 6.0
  d_lambda_pipe_a: 0.2        # CKS affine-parameter step dλ for the Hamiltonian geodesic (Formula CKS-5).
                               # Far-field h≈dλ (≈0.25 coord-units/step); shrinks toward the horizon via the
                               # adaptive factor below. Sized so a ~35-unit traverse (r_cam≈15→r_max=50) is
                               # ~140 steps and a photon-ring grazer's few orbits stay under max_steps.
  horizon_epsilon: 0.05        # CKS capture margin: stop when r <= r_plus + this (Formula CKS-6). CKS is
                               # regular at the horizon, so this only bounds step cost in the deep field.
  adaptive_step_floor: 0.02    # lower bound on the near-horizon adaptive step factor h = dλ·max(floor,(r−r₊)/r) (CKS-5)
  # NOTE (2026-06-06 CKS migration): render.sin2_min was REMOVED. It was the BL
  # 1/sin²θ polar guard (Formula 12); CKS has no spin-axis coordinate singularity.
  j_fold: 0.15                 # screen-space LOD/DNGR fold guard: an escaped pixel whose exit-direction
                               # footprint J(rad) exceeds this straddles a celestial-sphere texture pole
                               # or the chaotic shadow edge -> collapse to the coarsest mip. (Under CKS the
                               # BH spin-axis seam is gone; this now only guards the equirect texture poles.)
  motion_blur_samples: 4       # optimization Phase 4.2: temporal jitter samples per pixel
  fps: 24.0                    # animation frame rate; shutter arc = dphi*fps*shutter_fraction (optimization Phase 4.2)
  projection_mode: perspective # perspective | equirect (optimization Phase 4.1; perspective keeps the Doppler check valid)
  depth_infinity: 1.0e5        # optimization Phase 3.4: Z value written to pixels with no disk emission

disk:
  r_inner: auto            # auto → r_isco(spin) (zero-torque inner edge, Formula CKS-13).
                           # A number here is an artistic override; values below r_isco are
                           # clamped UP to it (no emission inside the ISCO — gas plunges).
  r_outer: 25.0
  theta_half_width: 0.15   # |θ - π/2| < this for bounding box (single source of truth for the slab)
  target_peak_temperature: 5500.0  # BASE look parameter: desired peak T_eff (K) of the disk.
                           # kerr_params derives the model amplitude T_0 from it (CKS-13):
                           #   page_thorne: T_0 = target (f_PT LUT is normalized to max 1)
                           #   simple:      T_0 = target·(r_inner/6)^0.75 (peak sits at r_inner)
                           # An explicit disk.T_0 key would override this (legacy escape hatch).
  emission_coeff: 4.0     # volumetric emission scale (visualization). RECALIBRATED for CKS
                           # (2026-06-07): the march integrates emis·density·g⁴·ds with ds = the
                           # CKS affine step (~0.1–0.24 coord-units), whereas the old 8.0 was tuned
                           # for the BL Mino step (~0.003–0.009, ~30× smaller). Scaled ~1/30 so the
                           # disk is optically thin and the g⁴-beamed inner edge is not washed out.
  absorption_coeff: 0.8   # volumetric absorption scale (visualization). RECALIBRATED for CKS ds
                           # (2026-06-07; was 1.5) — same ~1/30 BL-Mino→CKS-affine rescale.
  vertical_sigma_frac: 0.2 # gaussian scale height as fraction of theta_half_width
  max_step_vfrac: 0.5      # disk-thickness adaptive-step cap (Pipe B). While a ray is inside the
                           # slab its geodesic step is shrunk so the VERTICAL displacement |dz/dλ|·h
                           # spans at most this fraction of the local Gaussian scale height
                           # σ_z = r·theta_half_width·vertical_sigma_frac. Stops the horizon-distance
                           # step rule (CKS-5) from striding over the thin emitting layer when a ray
                           # crosses the equatorial plane steeply (face-on views), aliasing it into a
                           # moiré band. Only bites for steep crossings; near-in-plane / edge-on
                           # grazers (dz/dλ→0) keep the full step, so it adds no cost there and cannot
                           # push them into max_steps_pipe_a. Smaller = finer/slower; 0.5 ≈ 2 samples
                           # per σ. Guarded by tests/test_disk_step_convergence.py.
  temperature_model: page_thorne  # simple | page_thorne (D1). simple = T = T_0·(6/r)^0.75 (Decision B,
                           # default, golden frames). page_thorne = CKS-11 flux LUT: T_eff = T_0·f_PT^¼,
                           # emission amplitude ×f_PT, zero-torque F(r_isco)=0; T_0 stays the amplitude knob.
  flux_lut_samples: 256    # LUT resolution over [r_isco, r_outer] for the page_thorne f_PT(r) profile.
  doppler_strength: 0.1    # VISUALIZATION knob (not physics): g_eff = g^s on the CKS-9 shift, feeding
                           # both the g⁴ beaming amplitude AND the blackbody color shift. 1.0 = full
                           # physics (default; bit-identical kernel path, golden frames intact).
                           # 0.0 = shift off — the Interstellar/DNGR treatment (the film suppressed
                           # the Doppler asymmetry so the disk reads symmetric to the audience);
                           # ~0.2–0.4 keeps a hint of the bright approaching side. Scales the TOTAL
                           # shift (orbital Doppler + gravitational, inseparable in CKS-9).
  dynamics:                # BASE time-mapping look parameters (Formula CKS-13). The resolver
                           # derives from these + spin + disk extent: omega_inner/outer,
                           # period_inner_M / period_outer_M, wrap_time_M, and the two values the
                           # D2 noise system consumes — time_scale (geometric M of disk time per
                           # second of footage; t_disk = frame/fps · time_scale) and
                           # shear_period_M (the CKS-12 §2 dual-phase reseed period T).
                           # Everything rescales automatically when spin / r_inner / r_outer move.
    inner_lap_seconds: 10.0 # [look-dev] footage seconds for ONE full revolution of the disk
                           # inner edge → time_scale = T_orb(r_inner)/this. Smaller = faster disk.
    shear_wrap_budget: 3.0 # [look-dev] differential 2π-wraps across [r_inner, r_outer] tolerated
                           # before the CKS-12 reseed → shear_period_M = budget·2π/(Ω_in−Ω_out).
  volumetric:              # V1 volumetric lighting (spec docs/specs/2026-06-13-V1-self-shadow-
                           # source-function.md). Both flags default OFF ⇒ the legacy emission+
                           # extinction march is bit-identical to the D2 goldens.
    source_function: false # CKS-14 radiative-transfer source-function march. false ⇒ legacy
                           # color += T·emission. true ⇒ dI=(S−I)dτ with S = emission/dτ =
                           # (emis_c/absb_c)·[f_PT]·g_eff⁴·chroma (ρ,ds cancel). SAME continuum
                           # integral as legacy (∫S e^{−τ}dτ) — CKS-14 is its EXACT per-step
                           # quadrature (legacy over-counts thick steps), and it MATERIALISES S
                           # for the CKS-15 self_shadow below (S·e^{−τ_shadow} ⇒ voids). Thin
                           # limit reduces to Formula 9. The voids need source_function + the
                           # self_shadow block together, not source_function alone.
    self_shadow:           # CKS-15 radial deep-shadow-map self-shadow (VISUALIZATION, like
                           # doppler_strength — not a metric). WIRED V1.2; off here.
      enabled: false       # false ⇒ no bake, no shadow lookup (bit-identical). true ⇒ τ_shadow
                           # baked radially outward from r_inner per frame, then emission *=
                           # exp(−strength·τ_shadow) per sample. Pair with source_function for voids.
      strength: 1.0        # depth of the voids (0 = off; higher = darker shadow lanes).
      grid_nu: 96          # deep-shadow-map log-radial bins (u = ln r/r_inner).
      grid_nphi: 256       # azimuthal bins (φ, periodic).
      grid_nz: 16          # vertical bins across the slab (ζ = dz_ang/σ_θ).
      zeta_max: 3.0        # ±ζ extent of the grid (≈3σ covers the Gaussian slab).
      max_tau: 8.0         # clamp on accumulated shadow τ (overflow / caustic safety).
      lod_max_camera_radius: 0.0  # V1.3 LOD gate (M). 0 ⇒ off (always honor enabled). >0 ⇒
                           # skip the bake + lookup when |camera| exceeds it (wide/mid shots
                           # ride the cheap legacy march; close-ups keep the voids).
    flare:                 # V2 flared 3D density (SKILL.md CKS-16; spec docs/specs/
                           # 2026-06-14-V2-flared-3d-density.md). Gives the disk real vertical
                           # bulk so the noise's ζ-variation stops being squashed flat by the
                           # constant thin slab. Default OFF ⇒ bit-identical to the V1 goldens.
      enabled: false       # false ⇒ constant σ_θ slab (today, bit-identical). true ⇒ flared.
      beta: 0.0            # radial flare exponent: σ_θ(r) = σ0·(r/r_inner)^β with
                           # σ0 = theta_half_width·vertical_sigma_frac (the r_inner width).
                           # β=0 ⇒ constant-H/r slab (today); β>0 thickens the disk OUTWARD
                           # (H/r grows with radius — astrophysical flare). ~0.2–0.5 = visible.
      band_sigma: 3.0      # θ-band coverage factor. The CKS-13 resolver widens the bounding
                           # half-angle (theta_half_bound) to ≥ band_sigma·σ_θ(r_outer) so the
                           # flared outer envelope is not hard-clipped by the θ cutoff. 3 ≈ ±3σ.
  noise:                   # D2 procedural turbulence (SKILL.md CKS-12, spec docs/specs/
                           # 2026-06-13-disk-noise-turbulence.md). D2.2 = static DENSITY
                           # structure; D2.3 = Keplerian SHEAR ADVECTION (the field wraps
                           # with t_disk → the Interstellar filament look). Needs the
                           # disk.dynamics block above (shear_period_M); without it the
                           # field stays static (bit-identical to D2.2). temperature/edges/
                           # height are D2.4. All amps/freqs are [look-dev] placeholders.
                           # freq_phi MUST be an integer (2π periodicity, CKS-12 constraint 5).
    enabled: true          # master switch; false ⇒ branch bit-identical to the legacy
                           # kernel (golden frames untouched, CKS-12 constraint 6).
                           # Enabled globally 2026-06-13 (D2.4) so the production beauty
                           # path renders the turbulent disk. The GPU regression / step-
                           # convergence guards force this back to false so their goldens
                           # stay a pure GR/calibration check (noise is art, not physics).
    seed: 1234             # deterministic integer hash seed (no ti.random; same seed +
                           # same t_disk ⇒ identical frame, constraint 7).
    m_max: 2.5             # clamp on the log-density sum: density_mult = exp(clamp(m, ±m_max)).
    variance_preserve: true # D2.3: divide the dual-phase blend by √(w0²+w1²) so contrast
                           # doesn't "breathe" at mid-crossfade (w0=w1=0.5). No effect on
                           # the static path (single phase).
    dynamism: 6.0          # NON-PHYSICAL viz gain on the shear amount: φ′ = φ − dynamism·Ω·a·T.
                           # 1.0 = the CKS-12 §2 formula exactly (bit-identical). >1 emphasises
                           # the per-frame differential winding (swirl) without speeding up the
                           # reset cadence — bump this (e.g. 3–6) when the swirl reads too weak.
                           # Artistic dial, like disk.doppler_strength; not a metric change.
    modulation:            # D2.4 (SKILL.md CKS-12 §3): modulate EMISSION AMPLITUDES only —
                           # emitted temperature, the inner/outer edges, and the local scale
                           # height — never p_μ/u^μ/g/g⁴/f_PT (hard constraints 1–4). Each is
                           # an advected [0,1] fBm (co-moves with the gas, like the density
                           # field); n−½ ⇒ a ±½ swing. enabled:false ⇒ density-only D2.3 path,
                           # bit-identical. amps are [look-dev]; freq_phi MUST be an integer.
      enabled: true
      octaves: 3
      lacunarity: 2.0
      gain: 0.5
      freq_u: 4.0          # log-radial feature frequency of the envelopes
      freq_phi: 16         # azimuthal frequency (integer — 2π periodicity, constraint 5)
      temp_amp: 0.6        # τ_amp: T_emit ·= (1 + τ_amp·(n_T − ½)) BEFORE the g shift
                           # (constraint 2) — hot/cool filaments, the most visible cue.
      edge_in_amp: 0.30    # e_in:  r_in_eff = max(r_inner·(1 + e_in·(n_e − ½)), r_isco)
      edge_out_amp: 0.20   # e_out: r_out_eff = r_outer·(1 + e_out·(n_e' − ½)) — ragged rim
      edge_softness: 0.4   # smoothstep window width (geometric M) at each modulated edge
      height_amp: 0.5      # h_amp: σ_θ ·= (1 + h_amp·(n_h − ½)) — lumpy thickness. The Pipe-B
                           # step cap uses the worst-case σ_θ·(1 − h_amp/2) (constraint 4).
    layers:
      # L0 base streaks — fBm, features long along the orbit (freq_phi ≪ freq_u).
      base:  {enabled: true, amp: 0.6, octaves: 5, lacunarity: 2.0, gain: 0.5,
              freq_u: 6.0, freq_phi: 24}
      # L1 clump/tear — ridged MF × Voronoi billow, gated by a slow coverage mask.
      clump: {enabled: true, amp: 1.2, bias: 0.35, octaves: 3, lacunarity: 2.0,
              gain: 0.5, freq_u: 3.0, freq_phi: 12, freq_z: 1.0, coverage: 0.45,
              mask_freq_u: 1.0, mask_freq_phi: 3, ridge_offset: 1.0, voronoi_k: 4.0}
      # L2 patchiness — subtle large-scale fBm breaking the ring symmetry.
      patch: {enabled: true, amp: 0.35, octaves: 2, lacunarity: 2.0, gain: 0.5,
              freq_u: 1.5, freq_phi: 4}
  # NOTE: the Phase-3.3 |u|=|cosθ| disk-slab early-out bound is now DERIVED in code
  # as sin(theta_half_width) (renderer.render_beauty_frame) — the old hardcoded
  # `bounding_sin_theta_half: 0.14944` literal duplicated it and desynced whenever
  # theta_half_width was edited, so it was removed (config-sync fix).

# Background starmap for Pipe A escaped-ray lookup (Formula 10 differential mip LOD).
starmap:
  path: star_image/starmap_2020_16k.exr
  width: 16384             # equirect map width; LOD uses log2(width)

# DNGR background (Formula 13 / PROJECT.md §8): two decoupled sky layers.
#  - Layer A: point-star catalog gathered as energy and brightened by the per-pixel
#    lensing magnification mu (stars stay sharp, do not smear).
#  - Layer B: low-frequency Milky-Way texture sampled with an anisotropic EWA filter.
# mode=texture keeps the legacy Formula-10 baked-starmap path (golden frames intact);
# mode=dngr activates both layers. scripts/ingest_stars.py reads source_catalog
# (format auto: .csv=HYG/ATHYG, else V/50 bsc5.dat) and writes catalog_path.
starfield:
  mode: dngr              # texture | dngr  (dngr = Formula-13 Hybrid; default since 2026-06-06, fixes radial star-smear Artifact A)
  format: auto             # auto | hyg | bsc5  (auto -> by source_catalog extension)
  source_catalog: star_image/hyglike_from_athyg_v32.csv  # HYG/ATHYG v3.2 csv (or a V/50 bsc5.dat)
  catalog_path: assets/stars.npy   # ingest output: float32 [N,5] = theta', phi', flux_r, flux_g, flux_b
  mag_limit: 11.0          # drop stars fainter than this apparent V mag. Set to 11.0 (~Tycho-2
                           # completeness). RATIONALE REVISED 2026-06-07: Layer B is now the
                           # StarNet2-starless plate (starmap_final.exr), which carries ~zero point
                           # sources (acceptance metric: sharp >10x spikes 2.05%->0.045%), so the old
                           # "A/B energy boundary at 8.0 to avoid double-counting milkyway's baked
                           # stars" is void — that boundary assumed the diffuse map contained the
                           # Tycho field, which it does NOT (the milkyway_2020 vs starmap_2020 spike
                           # density was measured identical: the old comment was empirically false).
                           # With a truly starless Layer B, EVERY visible star must come from Layer A,
                           # so the catalog now extends to ~11 to repopulate the faint field as sharp,
                           # correctly-lensed point sources (Interstellar/DNGR approach). Re-run
                           # scripts/ingest_stars.py after changing this (mag_limit is applied at ingest).
  mag_zero_point: 6      # linear flux = 10^(-0.4*(Vmag - mag_zero_point)); sets overall Layer-A
                           # star brightness. APPLIED AT INGEST (baked into assets/stars.npy by
                           # scripts/ingest_stars.py) — the renderer never reads this, so you MUST
                           # re-run ingest_stars.py after changing it. 3.5 => ~25x flux vs the old
                           # 0.0: stars are clearly visible but stay below the accretion-disk edge
                           # peak (~6.17), keeping the Interstellar composition (10.0 was 10000x and
                           # blew them out). Does NOT affect the Layer-B diffuse band — that is
                           # starfield.diffuse_gain.
  # --- Layer A: point-star gather (Formula 13) ---
  star_grid_cols: 720      # equirect candidate-cell grid columns (azimuth phi')
  star_grid_rows: 360      # equirect candidate-cell grid rows (colatitude theta')
  star_psf_px: 1.3         # Gaussian PSF sigma in screen pixels (A.3.1 anti-flicker splat)
  psf_trunc_sigma: 3.0     # truncate the splat at |d| < psf_trunc_sigma * sigma (pixels)
  mag_clip: 50.0           # cap on lensing brightness gain mu (caustic safety)
  caustic_delta_min: 1.0e-3 # minor ellipse axis delta- below this => on a caustic => clamp mu
  g_beaming: false         # volumetric g^4 Doppler hook for stars (false => g==1; static camera)
  # --- Layer B: diffuse Milky Way (anisotropic EWA) ---
  diffuse_map: star_image/starmap_final.exr  # STARLESS galaxy band (Layer B only). Was
                           # milkyway_2020_16k.exr, but that plate still carried the full baked
                           # point-star field (verified: ~2% of lit px were sharp >10x spikes), which
                           # the anisotropic EWA footprint smears into directional streaks at wide-FOV
                           # screen edges (the edge-elongation artifact). starmap_final.exr is
                           # starmap_2020_16k run through StarNet2 + a gnomonic-reprojection polar pass
                           # (see star_image/starmap_workflow.md): sharp >10x spikes drop 46x to 0.045%,
                           # so EWA has no point sources to stretch. Stars are now drawn ONLY by Layer A.
  diffuse_width: 16384     # equirect diffuse map width; LOD uses log2(width)
  diffuse_gain: 4.5        # Layer-B brightness multiplier, applied at RENDER time in _dngr_shade
                           # (diffuse *= diffuse_gain). Unlike mag_zero_point this needs NO re-ingest
                           # — tune it freely per render. 1.0 = raw EXR (identity). The StarNet2
                           # plate measures ~1.75x dimmer mean than the old milkyway_2020 band, so
                           # 1.75 restores parity and 3.0 (starting value) brightens past it. This is
                           # the ONLY brightness control for the diffuse galaxy band.
  ewa_max_taps: 8          # max anisotropic taps along the major ellipse axis
  jacobian: finite_diff    # finite_diff | geodesic_deviation (FD shipped; deviation = future upgrade)

camera:
  default_radius: 6.03
  default_fov_deg: 90.0
  shutter_fraction: 0.020833   # 1/48 s shutter interval for relativistic motion blur (optimization Phase 4.2)

# Thumbnail preview renderer (scripts/thumb.py) display/framing parameters.
# Pure visualization parameters: they control look, not physics.
thumb:
  # Preview framing: the cinematic camera (camera.default_radius=6.03, fov=90)
  # sits so close that the capture cone over-fills a 90 deg frame and the photon
  # ring falls outside it. For verification we pull back and narrow the FOV so
  # the whole shadow + ring fit with background margin.
  camera_radius: 15.0             # preview camera Boyer-Lindquist r (M)
  fov_deg: 60.0                   # preview field of view
  camera_theta_deg: 85.0          # camera polar angle (inclination); ~edge-on
  background_top: [0.015, 0.02, 0.05]    # linear RGB at top of frame
  background_bottom: [0.0, 0.0, 0.0]     # linear RGB at bottom of frame
  ring_color: [1.0, 0.94, 0.80]   # photon-ring glow tint (linear RGB)
  ring_gain: 1.4                  # photon-ring glow brightness
  ring_r_peak: 1.6                # r (M) of peak ring glow ~ photon sphere
  ring_r_sigma: 0.6               # width (M) of the ring glow falloff
  exposure: 1.0                   # linear pre-tonemap exposure multiplier
  gamma: 2.2                      # display gamma for sRGB-ish output

output:
  blackhole_dir: render_blackhole/
  spaceship_dir: render_spaceship/
  blackhole_prefix: bh_
  spaceship_prefix: ship_
