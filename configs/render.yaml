black_hole:
  spin: 0.999
  r_isco: 1.182
  r_plus: 1.0447   # outer horizon r+ = 1 + sqrt(1 - a^2), a=0.999 (true horizon radius)

render:
  width: 3840
  height: 2160
  thumb_width: 256
  thumb_height: 256
  max_steps_pipe_a: 250
  max_steps_pipe_b: 200
  r_max: 50.0
  device_memory_gb: 6.0
  d_lambda_pipe_a: 0.01        # Mino-time step for Pipe A geodesic integration
  horizon_epsilon: 0.05        # Δ-capture stop before the horizon (was hardcoded _DELTA_MIN)
  adaptive_step_floor: 0.005   # guid 2.2: lower bound on the y-scaled adaptive step factor
  sin2_min: 1.0e-10            # polar guard on dφ/dλ, dt/dλ denominators only (Formula 12)
  j_fold: 0.15                 # background LOD fold-saturation: escaped pixels whose screen-space exit footprint J(rad) exceeds this straddle the spin-axis meridian caustic -> collapse to coarsest mip (kills the center "static" seam)
  motion_blur_samples: 4       # guid 4.2: temporal jitter samples per pixel
  fps: 24.0                    # animation frame rate; shutter arc = dphi*fps*shutter_fraction (guid 4.2)
  projection_mode: perspective # perspective | equirect (guid 4.1; perspective keeps the Doppler check valid)
  depth_infinity: 1.0e5        # guid 3.4: Z value written to pixels with no disk emission

disk:
  r_inner: 1.182
  r_outer: 25.0
  theta_half_width: 0.15   # |θ - π/2| < this for bounding box
  T_0: 1.0e4               # inner reference temperature (Decision B: T = T_0·(6/r)^0.75)
  emission_coeff: 8.0      # volumetric emission scale (visualization)
  absorption_coeff: 1.5    # volumetric absorption scale (visualization)
  vertical_sigma_frac: 0.5 # gaussian scale height as fraction of theta_half_width
  bounding_sin_theta_half: 0.14944  # = sin(theta_half_width=0.15); guid 3.3 |u| early-out

# Background starmap for Pipe A escaped-ray lookup (Formula 10 differential mip LOD).
starmap:
  path: star_image/starmap_2020_16k.exr
  width: 16384             # equirect map width; LOD uses log2(width)

camera:
  default_radius: 6.03
  default_fov_deg: 90.0
  shutter_fraction: 0.020833   # 1/48 s shutter interval for relativistic motion blur (guid 4.2)

# Thumbnail preview renderer (scripts/thumb.py) display/framing parameters.
# Pure visualization parameters: they control look, not physics.
thumb:
  # Preview framing: the cinematic camera (camera.default_radius=6.03, fov=90)
  # sits so close that the capture cone over-fills a 90 deg frame and the photon
  # ring falls outside it. For verification we pull back and narrow the FOV so
  # the whole shadow + ring fit with background margin.
  camera_radius: 15.0             # preview camera Boyer-Lindquist r (M)
  fov_deg: 60.0                   # preview field of view
  camera_theta_deg: 85.0          # camera polar angle (inclination); ~edge-on
  background_top: [0.015, 0.02, 0.05]    # linear RGB at top of frame
  background_bottom: [0.0, 0.0, 0.0]     # linear RGB at bottom of frame
  ring_color: [1.0, 0.94, 0.80]   # photon-ring glow tint (linear RGB)
  ring_gain: 1.4                  # photon-ring glow brightness
  ring_r_peak: 1.6                # r (M) of peak ring glow ~ photon sphere
  ring_r_sigma: 0.6               # width (M) of the ring glow falloff
  exposure: 1.0                   # linear pre-tonemap exposure multiplier
  gamma: 2.2                      # display gamma for sRGB-ish output

output:
  blackhole_dir: render_blackhole/
  spaceship_dir: render_spaceship/
  blackhole_prefix: bh_
  spaceship_prefix: ship_
